<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — SportShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>🏋️ SportShop</h1>
        </div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="cart.html">Корзина (<span id="cart-count">0</span>)</a>
            <a href="checkout.html">Оформление</a>
            <a href="contacts.html">Контакты</a>
            <a href="calculator.html">BMI</a>
            <a href="todo.html">Тренировки</a>
            <a href="product.html">Хиты</a>
        </nav>
    </header>

    <main>
        <h1>📞 Контакты</h1>
        
        <div class="contacts-grid">
            <div class="contacts-info">
                <h2>Свяжитесь с нами</h2>
                <p>📞 Телефон: <strong>+7 (495) 123-45-67</strong></p>
                <p>📧 Email: <strong>info@sportshop.ru</strong></p>
                <p>📍 Адрес: г. Москва, ул. Спортивная, д. 10</p>
                <p>⏰ Режим работы: Пн-Пт 10:00–20:00, Сб 11:00–18:00</p>
            </div>
            
            <div class="contacts-form">
                <h2>Написать нам</h2>
                <form id="feedback-form" onsubmit="sendFeedback(event)">
                    <input type="text" placeholder="Ваше имя" id="fb-name" required>
                    <input type="email" placeholder="Ваш Email" id="fb-email" required>
                    <select id="fb-subject" required>
                        <option value="">Тема обращения</option>
                        <option>Вопрос о товаре</option>
                        <option>Возврат товара</option>
                        <option>Сотрудничество</option>
                        <option>Другое</option>
                    </select>
                    <textarea placeholder="Ваше сообщение" id="fb-message" rows="5" required></textarea>
                    <button type="submit" class="btn-primary">Отправить</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 SportShop</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
